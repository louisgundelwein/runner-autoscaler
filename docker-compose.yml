services:
  autoscaler:
    build: .
    restart: unless-stopped
    init: true
    mem_limit: 256m
    expose:
      - '8080'
    environment:
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?set GITHUB_WEBHOOK_SECRET in the environment}
      GITHUB_TOKEN: ${GITHUB_TOKEN:?set GITHUB_TOKEN in the environment}
      GITHUB_REPOS: ${GITHUB_REPOS:?set GITHUB_REPOS in the environment}
      HCLOUD_TOKEN: ${HCLOUD_TOKEN:?set HCLOUD_TOKEN in the environment}
      PUBLIC_URL: ${PUBLIC_URL:?set PUBLIC_URL in the environment}
      HETZNER_SERVER_TYPE: ${HETZNER_SERVER_TYPE:-cx33}
      HETZNER_IMAGE: ${HETZNER_IMAGE:-ubuntu-24.04}
      HETZNER_LOCATION: ${HETZNER_LOCATION:-nbg1}
      HETZNER_SSH_KEY: ${HETZNER_SSH_KEY:-}
      RUNNER_LABELS: ${RUNNER_LABELS:-self-hosted,hetzner}
      MAX_RUNNERS: ${MAX_RUNNERS:-3}
      MAX_RUNNER_LIFETIME_MINUTES: ${MAX_RUNNER_LIFETIME_MINUTES:-360}
      CLEANUP_INTERVAL_MINUTES: ${CLEANUP_INTERVAL_MINUTES:-2}
      PORT: '8080'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
